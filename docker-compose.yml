version: '3'

services: 
  backend:
    build:
      context: .
    command: gunicorn PeakDay.wsgi --bind 0.0.0.0:8000
    ports:
      - "8000:8000"
  frontend:
    build:
      context: ./frontend
    command: npm start  # Use the development server command
    restart: always  # This ensures the container is always restarted if it exits
  nginx: 
    image: nginx:latest
    ports:
      - "80:8080"
    volumes:
      - ./PeakDayApp/nginx/nginx-setup.conf:/etc/nginx/conf.d/default.conf:ro
      - react_build:/var/www/react
    depends_on:
      - backend
      - frontend
volumes:
  react_build:
